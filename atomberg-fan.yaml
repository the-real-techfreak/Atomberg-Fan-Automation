esphome:
  name: fan-1
  friendly_name: fan-1

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "fan-1"
    password: "esphomerocks"

captive_portal:
    
remote_transmitter:
  pin: 12 #D2
  carrier_duty_percent: 50%    

bluetooth_proxy:
  active: True  

switch:

# IR Remote Buttons


  - platform: template
    name: "1"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x748B
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "2"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x6F90
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "3"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x758A
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "4"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x6C93
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "5"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x7788
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "BOOST"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x708F
          repeat:
            times: 15
            wait_time: 50ms
  - platform: template
    name: "fan_light"
    internal: true
    turn_on_action:
      - remote_transmitter.transmit_nec:
          address: 0xF300
          command: 0x6897
          repeat:
            times: 1
            wait_time: 50ms    


#<<<<<<<<<<<--------------END OF REMOTE BUTTONS----------->>>>>>>>>>>>>


output:
# Template for Fan Speed Control
  - platform: template
    id: fan_speed_output
    type: float
    write_action:
      - logger.log:
          format: "Speed to set: %i"
          args: [ 'id(fan_atomberg).speed']
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 1);
          then:
            - logger.log: "Setting speed to 1"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote
                address: 0xF300
                command: 0x748B
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 2);
          then:
            - logger.log: "Setting speed to 2"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote


                address: 0xF300
                command: 0x6F90
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 3);
          then:
            - logger.log: "Setting speed to 3"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote


                address: 0xF300
                command: 0x758A
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 4);
          then:
            - logger.log: "Setting speed to 4"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote


                address: 0xF300
                command: 0x6C93
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 5);
          then:
            - logger.log: "Setting speed to 5"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote


                address: 0xF300
                command: 0x7788
      - if:
          condition:
            lambda: return (id(fan_atomberg).state == 1 and id(fan_atomberg).speed == 6);
          then:
            - logger.log: "Setting speed to 6"
            - remote_transmitter.transmit_nec:
#                transmitter_id: remote


                address: 0xF300
                command: 0x708F




# Automated Fan Setup
fan:
  - platform: speed
    output: fan_speed_output
    name: "Atomberg Fan"
    id: fan_atomberg
    speed_count: 6
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - logger.log: "Fan Turned On!"
    on_turn_off:
      - logger.log: "Fan Turned Off!"
      - remote_transmitter.transmit_nec:
#          transmitter_id: remote
          address: 0xF300
          command: 0x6E91
